<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlterVector | Solucions Digitals Dinàmiques</title>
    <style>
        :root {
            /* Hem capturat els colors del teu logo per a la web */
            --primary: #129dfc; /* Blau brillant del degradat del logo */
            --dark: #0f4a86; /* Blau fosc per a textos de contrast */
            --grey: #555555;
            --bg: #ffffff;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--bg);
            color: var(--dark);
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 40px 20px;
            text-align: center;
        }

        /* Contenidor del Logo */
        .logo-box {
            margin-bottom: 30px;
        }
        .logo-img {
            max-width: 250px; /* Ajustat perquè es vegi bé el text del logo */
            height: auto;
        }

        h1 {
            font-size: 1.1rem;
            font-weight: 400;
            line-height: 1.6;
            color: var(--grey);
            margin-bottom: 40px;
        }

        /* Targeta de Projecte (Oleyaji) */
        .project-card {
            border: 1px solid #eaeaea;
            border-radius: 12px;
            padding: 24px;
            text-decoration: none;
            display: block;
            color: inherit;
            transition: all 0.2s ease;
            text-align: left;
        }
        .project-card:hover {
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(18, 157, 252, 0.1); /* Una ombra molt suau del color corporatiu al fer hover */
        }
        .badge {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--primary); /* Blau del logo */
            display: block;
            margin-bottom: 8px;
        }
        .project-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin: 0 0 5px 0;
            color: var(--dark); /* Blau fosc del logo per al títol */
        }
        .project-desc {
            font-size: 0.9rem;
            color: var(--grey);
            margin: 0;
        }

        /* Secció Contacte */
        .contact-footer {
            margin-top: 50px;
            padding-top: 20px;
            font-size: 0.9rem;
            color: var(--grey);
        }
        .contact-footer a {
            color: var(--dark);
            text-decoration: none;
            font-weight: 600;
            border-bottom: 1px solid transparent;
        }
        .contact-footer a:hover {
            border-bottom-color: var(--dark);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-box">
            <img src="logoAVtrans.png" alt="AlterVector" class="logo-img">
        </div>
        
        <h1>Digitalització de negocis mitjançant catàlegs dinàmics i alta velocitat de càrrega.</h1>

        <a href="https://oleyaji.altervector.com" class="project-card">
            <span class="badge">Projecte destacat</span>
            <p class="project-title">Oleyaji Gastronomia</p>
            <p class="project-desc">Sistema de carta digital dinàmica optimitzada per a dispositius mòbils.</p>
        </a>

        <div class="contact-footer">
            <p>Per a consultes i suport tècnic:</p>
            <a href="mailto:suport@altervector.com">suport@altervector.com</a>
        </div>
    </div>

</body>
</html>
